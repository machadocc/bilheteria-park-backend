apiVersion: apps/v1
kind: Deployment
metadata:
  name: bilheteria-park
  labels:
    app: bilheteria-park
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bilheteria-park
  template:
    metadata:
      labels:
        app: bilheteria-park
    spec:
      containers:
        - name: web
          image: bilheteria-park:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://ticketing:ticketing@postgres:5432/ticketing"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: bilheteria-park-service
spec:
  selector:
    app: bilheteria-park
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
