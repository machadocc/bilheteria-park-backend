services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://ticketing:ticketing@db:5432/ticketing
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

volumes:
  db_data: {}
