version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/ticketing
      - AWS_SQS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/083341703320/teste
      - AWS_REGION=us-east-1
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ticketing
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: